<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-box"> 
                <div class="logo-icon">
                    <span>✂</span>
                </div>
                <div class="logo-text">
                    <h1>LA PALMAS</h1>
                    <p>BARBEARIA</p>
                </div>    
            </div>
            <!-- LOCALIZAÇÃO -->
            <div class="location-box">
                <span class="pin-icon">📍</span>
                <span class="location-text">Cidade, Estado</span>
            </div>
        </div>
        <nav class="progress-nav">
            <div class="progress-container">
                <div class="step active">
                    <span class="step-num">01</span>
                    <span class="step-name">SERVIÇO</span>
                </div>
                <div class="step">
                    <span class="step-num">02</span>
                    <span class="step-name">BARBEIRO</span>
                </div>
                <div class="step">
                    <span class="step-num">03</span>
                    <span class="step-name">HORÁRIO</span>
                </div>
                <div class="step">
                    <span class="step-num">04</span>
                    <span class="step-name">CONFIRMAR</span>
                </div>
            </div>
        </nav>
    </header>



</body>
</html>
